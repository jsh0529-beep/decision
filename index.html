<html lang="ko">
<head>

<title>결단 뚝심 신의 — 경북 상식 대결</title>

     cover.jpg(책 표지)를 index.html과 같은 위치에 올리면
     카톡·Threads 공유 시 표지가 썸네일로 뜹니다. -->

<meta property="og:description" content="열두 문제, 세 관문. 당신의 경북 내공에 낙관이 찍힙니다. 《이철우가 걸어온 길》 출간 기념 퀴즈.">

<style>
  :root{
    --ink:#161412;        /* 먹색 */
    --paper:#F5F1E8;      /* 한지색 */
    --paper-dim:#EAE4D6;
    --seal:#B3261E;       /* 낙관 빨강 */
    --gray:#8B8578;
    --line:#2C2925;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",sans-serif;
    display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .stage{
    width:100%;max-width:430px;min-height:100vh;
    display:flex;flex-direction:column;
    padding:20px 20px 110px;
    position:relative;
  }

  /* ===== 세로쓰기 타이틀 (표지 오마주) ===== */
  .cover{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:28px;
  }
  .vertical-title{
    display:flex;flex-direction:row-reverse;gap:26px;justify-content:center;
    margin-bottom:6px;
  }
  .vcol{
    writing-mode:vertical-rl;text-orientation:upright;
    font-family:"Nanum Myeongjo","Batang","바탕",serif;
    font-size:52px;font-weight:800;letter-spacing:14px;
    color:var(--paper);
  }
  .cover .sub{
    font-size:14px;letter-spacing:6px;color:var(--gray);
  }
  .cover .desc{
    font-size:14.5px;line-height:1.8;color:#CFC9BC;max-width:300px;
    word-break:keep-all;
  }
  .cover .shuffle-note{
    font-size:12px;letter-spacing:2px;color:var(--gray);
  }
  .seal-mark{
    width:46px;height:46px;border:2.5px solid var(--seal);color:var(--seal);
    display:flex;align-items:center;justify-content:center;
    font-family:"Nanum Myeongjo",serif;font-size:22px;font-weight:800;
    transform:rotate(-4deg);border-radius:4px;
  }

  /* ===== 버튼 ===== */
  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:inherit;font-weight:700;
    transition:transform .12s ease, background .15s ease, color .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn:focus-visible{outline:3px solid var(--seal);outline-offset:3px;}
  .btn-primary{
    background:var(--paper);color:var(--ink);
    font-size:17px;letter-spacing:3px;
    padding:16px 46px;border-radius:2px;
  }
  .btn-ghost{
    background:transparent;color:var(--gray);
    font-size:13px;letter-spacing:2px;
    padding:10px 18px;text-decoration:underline;text-underline-offset:4px;
  }

  /* ===== 진행 헤더 ===== */
  .quiz-head{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:8px;
  }
  .stage-name{
    font-family:"Nanum Myeongjo",serif;font-size:26px;font-weight:800;letter-spacing:8px;
  }
  .stage-name small{font-size:12px;letter-spacing:2px;color:var(--seal);display:block;margin-bottom:4px;font-family:inherit;}
  .q-count{font-size:13px;color:var(--gray);letter-spacing:1px;}
  .progress{height:3px;background:var(--line);border-radius:2px;overflow:hidden;margin-bottom:26px;}
  .progress > div{height:100%;background:var(--seal);width:0%;transition:width .35s ease;}

  /* ===== 문제 ===== */
  .question{
    font-size:19px;font-weight:700;line-height:1.65;
    word-break:keep-all;margin-bottom:26px;min-height:64px;
  }
  .choices{display:flex;flex-direction:column;gap:11px;}
  .choice{
    background:transparent;border:1px solid var(--line);color:var(--paper);
    text-align:left;font-size:15.5px;line-height:1.5;
    padding:15px 16px;border-radius:2px;word-break:keep-all;
    display:flex;gap:12px;align-items:flex-start;
  }
  .choice .mark{color:var(--gray);font-family:"Nanum Myeongjo",serif;font-weight:800;flex:none;}
  .choice:not(:disabled):hover{border-color:var(--paper);}
  .choice.correct{border-color:var(--seal);background:rgba(179,38,30,.12);}
  .choice.wrong{opacity:.35;}
  .choice.picked-wrong{border-color:var(--gray);background:rgba(139,133,120,.12);}

  /* ===== 낙관 도장 (시그니처) ===== */
  .stamp{
    position:absolute;top:38%;left:50%;
    width:110px;height:110px;
    border:5px solid var(--seal);border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:"Nanum Myeongjo",serif;font-size:58px;font-weight:900;color:var(--seal);
    background:rgba(22,20,18,.55);backdrop-filter:blur(1px);
    pointer-events:none;opacity:0;
    transform:translate(-50%,-50%) rotate(-8deg) scale(2.2);
  }
  .stamp.show{animation:stampIn .45s cubic-bezier(.2,1.4,.4,1) forwards;}
  @keyframes stampIn{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-8deg) scale(2.2);}
    60%{opacity:1;transform:translate(-50%,-50%) rotate(-8deg) scale(.92);}
    100%{opacity:1;transform:translate(-50%,-50%) rotate(-8deg) scale(1);}
  }
  @media (prefers-reduced-motion: reduce){
    .stamp.show{animation:none;opacity:1;transform:translate(-50%,-50%) rotate(-8deg) scale(1);}
    .progress > div{transition:none;}
  }

  /* ===== 해설 ===== */
  .explain{
    margin-top:20px;border-left:3px solid var(--seal);
    padding:12px 14px;background:rgba(245,241,232,.05);
    font-size:14px;line-height:1.75;color:#D8D2C4;word-break:keep-all;
    display:none;
  }
  .explain.show{display:block;}
  .explain b{color:var(--paper);}
  .next-wrap{margin-top:22px;display:none;}
  .next-wrap.show{display:block;}

  /* ===== 결과 ===== */
  .result{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:18px;
  }
  .result .title-label{font-size:13px;letter-spacing:4px;color:var(--gray);}
  .result .earned-title{
    font-family:"Nanum Myeongjo",serif;font-size:40px;font-weight:900;letter-spacing:8px;
    color:var(--paper);
  }
  .result .score{
    font-size:15px;color:#CFC9BC;line-height:1.8;word-break:keep-all;max-width:300px;
  }
  .result .score b{color:var(--seal);font-size:20px;}
  .medal{
    width:84px;height:84px;border:3px solid var(--seal);border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-family:"Nanum Myeongjo",serif;font-size:40px;font-weight:900;color:var(--seal);
    transform:rotate(-5deg);margin-bottom:4px;
  }
  .btn-share{
    background:transparent;color:var(--paper);
    border:1px solid var(--paper);
    font-size:15px;letter-spacing:3px;
    padding:14px 40px;border-radius:2px;
    display:inline-flex;align-items:center;gap:10px;
  }
  .btn-share:hover{background:var(--paper);color:var(--ink);}

  /* ===== 복사 완료 토스트 ===== */
  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(12px);
    background:var(--paper);color:var(--ink);
    font-size:13.5px;font-weight:700;letter-spacing:.5px;
    padding:11px 20px;border-radius:3px;
    box-shadow:0 4px 18px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;z-index:99;
    transition:opacity .25s ease, transform .25s ease;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== 구매 배너 ===== */
  .buy-banner{
    position:fixed;left:0;right:0;bottom:0;
    display:flex;justify-content:center;
    background:linear-gradient(to top, rgba(10,9,8,.97) 70%, rgba(10,9,8,0));
    padding:14px 16px 18px;
    z-index:50;
  }
  .buy-banner a{
    width:100%;max-width:398px;
    background:var(--seal);color:#FFF;text-decoration:none;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:14px 18px;border-radius:3px;
    font-weight:800;letter-spacing:.5px;
    box-shadow:0 6px 22px rgba(179,38,30,.35);
    transition:transform .12s ease;
  }
  .buy-banner a:active{transform:scale(.98);}
  .buy-banner .bk-t{font-size:15px;}
  .buy-banner .bk-s{display:block;font-size:11.5px;font-weight:500;opacity:.85;margin-top:3px;letter-spacing:1px;}
  .buy-banner .arrow{font-size:20px;flex:none;}

  .screen{display:none;flex:1;flex-direction:column;}
  .screen.active{display:flex;}
</style>
</head>
<body>
<div class="stage">

  <!-- 시작 화면 -->
  <section class="screen active" id="scr-cover">
    <div class="cover">
      <div class="vertical-title" aria-label="결단 뚝심 신의">
        <span class="vcol">결단</span>
        <span class="vcol">뚝심</span>
        <span class="vcol">신의</span>
      </div>
      <div class="seal-mark">任</div>
      <p class="sub">경북 상식 대결 · 三단계</p>
      <p class="desc">
        《이철우가 걸어온 길》 속 이야기로 만든 문제 은행.
        결단 → 뚝심 → 신의, 세 관문을 넘으면
        당신의 칭호가 낙관으로 찍힙니다.
      </p>
      <p class="shuffle-note">매 판 열두 문제가 무작위로 뽑힙니다</p>
      <button class="btn btn-primary" onclick="startGame()">시작</button>
    </div>
  </section>

  <!-- 퀴즈 화면 -->
  <section class="screen" id="scr-quiz">
    <div class="quiz-head">
      <div class="stage-name" id="stageName"><small>제1관문</small>결단</div>
      <div class="q-count" id="qCount">1 / 12</div>
    </div>
    <div class="progress"><div id="progBar"></div></div>
    <p class="question" id="qText"></p>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="next-wrap" id="nextWrap">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">다음</button>
    </div>
    <div class="stamp" id="stamp" aria-hidden="true">正</div>
  </section>

  <!-- 결과 화면 -->
  <section class="screen" id="scr-result">
    <div class="result">
      <div class="medal" id="medalChar">信</div>
      <p class="title-label">당신에게 찍힌 낙관</p>
      <p class="earned-title" id="earnedTitle">신의의 사람</p>
      <p class="score" id="scoreText"></p>
      <button class="btn btn-share" onclick="shareResult()">
        <span>결과 공유하기</span><span aria-hidden="true">⤴</span>
      </button>
      <button class="btn btn-ghost" onclick="restart()">새 문제로 다시 풀기</button>
    </div>
  </section>

</div>

<div class="toast" id="toast">공유 문구가 복사됐습니다. 붙여넣기 하세요!</div>

<!-- 구매 배너 (상시 노출) -->
<div class="buy-banner">
  <a href="https://smartstore.naver.com/wordleaf/products/13268630037?NaPm=ct%3Dmr8wkujc%7Cci%3D63d3ad45af52fb1861586beded64e7252bb12ec7%7Ctr%3Dboknx%7Csn%3D12508354%7Chk%3D2741e43037e78c0ab21192d89136c28371a0178f"
     target="_blank" rel="noopener">
    <span>
      <span class="bk-t">《결단 뚝심 신의》 책 구매하기</span>
      <span class="bk-s">이철우가 걸어온 길 · 네이버 스마트스토어</span>
    </span>
    <span class="arrow">→</span>
  </a>
</div>

<script>
// =====================================================
// 문제 은행 (관문당 8문 × 3관문 = 24문)
// 매 판: 관문별 4문 무작위 추출 + 문항 순서 셔플 + 보기 순서 셔플
// =====================================================
const STAGES = [
  { key:"결단", label:"제1관문", char:"決" },
  { key:"뚝심", label:"제2관문", char:"志" },
  { key:"신의", label:"제3관문", char:"信" },
];

const PER_STAGE = 4; // 관문당 출제 수

const BANK = [
  // ───────── 1관문 결단: 경북 기초 상식 (17문)
  { s:0, q:"현재 경상북도의 시·군은 모두 몇 개일까요?",
    c:["20개","22개","24개","26개"], a:1,
    e:"경북은 <b>10개 시 + 12개 군 = 22개 시·군</b>입니다. 2023년 7월 군위군이 대구광역시로 편입되면서 22개가 되었습니다." },
  { s:0, q:"경상북도청이 있는 도시는 어디일까요?",
    c:["포항시","경주시","안동시","구미시"], a:2,
    e:"경북도청은 2016년 대구에서 <b>안동시 풍천면</b>(경북도청신도시)으로 이전했습니다." },
  { s:0, q:"경북에서 인구가 가장 많은 도시는?",
    c:["구미시","경산시","포항시","경주시"], a:2,
    e:"경북 최대 도시는 <b>포항시</b>입니다. 철강 도시이자 경북 동해안 경제의 중심입니다." },
  { s:0, q:"127년간 경북의 식구였다가 2023년 대구로 편입된 곳은?",
    c:["칠곡군","군위군","성주군","고령군"], a:1,
    e:"<b>군위군</b>은 대구경북통합신공항 추진 과정에서 2023년 7월 1일 대구광역시로 편입됐습니다." },
  { s:0, q:"‘참외’ 하면 바로 떠오르는 경북의 고장은?",
    c:["성주군","의성군","청도군","영양군"], a:0,
    e:"<b>성주군</b>은 전국 참외 생산의 대부분을 차지하는 참외의 본고장입니다." },
  { s:0, q:"겨울 별미 ‘대게’로 이름난 경북 동해안의 고장은?",
    c:["울진군","영덕군","포항시","경주시"], a:1,
    e:"<b>영덕군</b> 강구항은 대게의 대명사입니다. 이웃 울진 대게도 유명하지만, ‘영덕대게’가 가장 널리 알려져 있습니다." },
  { s:0, q:"안동 하회마을과 경주 양동마을이 나란히 오른 목록은?",
    c:["국가지질공원","유네스코 세계유산","람사르 습지","국립공원"], a:1,
    e:"두 마을은 2010년 ‘한국의 역사마을’로 <b>유네스코 세계유산</b>에 함께 등재됐습니다." },
  { s:0, q:"현재 경상북도 인구 규모에 가장 가까운 숫자는?",
    c:["약 150만 명","약 250만 명","약 350만 명","약 450만 명"], a:1,
    e:"경북 인구는 <b>약 250만 명</b> 수준입니다. 인구 감소와 지방소멸 대응이 도정의 최대 과제 중 하나입니다." },
  { s:0, q:"경북에서 면적이 가장 넓은 시는?",
    c:["포항시","경주시","안동시","상주시"], a:2,
    e:"<b>안동시</b>는 약 1,522㎢로 경북에서 가장 넓고, 전국 시 단위에서도 최대급입니다." },
  { s:0, q:"조선시대 영남 선비들이 한양 과거길에 넘던 고개 ‘새재’가 있는 곳은?",
    c:["문경시","김천시","영주시","봉화군"], a:0,
    e:"<b>문경새재</b>는 영남대로의 관문이었습니다. ‘경사스러운 소식을 듣는다’는 문경(聞慶)이라는 지명과도 잘 어울리는 길입니다." },
  { s:0, q:"한반도에서 해가 가장 먼저 뜨는 곳으로 유명한 ‘호미곶’이 있는 도시는?",
    c:["경주시","포항시","울진군","영덕군"], a:1,
    e:"<b>포항</b> 호미곶은 새해 해맞이 명소입니다. ‘상생의 손’ 조형물로도 유명합니다." },
  { s:0, q:"불국사와 석굴암이 있는 천년고도는?",
    c:["안동시","상주시","경주시","영천시"], a:2,
    e:"<b>경주</b>는 신라 천년의 수도입니다. 불국사·석굴암은 1995년 유네스코 세계유산에 등재됐습니다." },
  { s:0, q:"우리나라 최초의 서원인 ‘소수서원’이 있는 고장은?",
    c:["안동시","영주시","예천군","성주군"], a:1,
    e:"<b>영주</b> 소수서원은 조선 최초의 사액서원입니다. 2019년 ‘한국의 서원’으로 유네스코 세계유산에 올랐습니다." },
  { s:0, q:"‘오징어’ 하면 떠오르는 경북의 섬은?",
    c:["거제도","울릉도","완도","강화도"], a:1,
    e:"<b>울릉도</b>는 오징어의 섬입니다. 밤바다의 오징어잡이 배 불빛 ‘어화(漁火)’는 울릉 8경 중 하나로 꼽힙니다." },
  { s:0, q:"대가야의 옛 도읍으로, 대규모 고분군이 남아 있는 경북의 고장은?",

// ===== 셔플 유틸 (Fisher–Yates) =====
function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== 이번 판 문제 구성 =====
// 관문 순서(결단→뚝심→신의)는 유지, 관문 안에서 무작위 추출+셔플
function buildRound(){
  const round = [];
  for(let s = 0; s < STAGES.length; s++){
    const pool = BANK.filter(q => q.s === s);
    const picked = shuffle(pool).slice(0, PER_STAGE);
    picked.forEach(q => {
      // 보기 셔플: 정답 텍스트 기준으로 재계산
      const answerText = q.c[q.a];
      const mixed = shuffle(q.c);
      round.push({
        s: q.s, q: q.q, e: q.e,
        c: mixed,
        a: mixed.indexOf(answerText),
      });
    });
  }
  return round;
}

function $(id){ return document.getElementById(id); }
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}

function startGame(){
  ROUND = buildRound();
  idx = 0; score = 0;
  show("scr-quiz");
  renderQuestion();
}

function renderQuestion(){
  locked = false;
  const q = ROUND[idx];
  const st = STAGES[q.s];
  $("stageName").innerHTML = `<small>${st.label}</small>${st.key}`;
  $("qCount").textContent = `${idx+1} / ${ROUND.length}`;
  $("progBar").style.width = `${(idx / ROUND.length) * 100}%`;
  $("qText").textContent = q.q;

  const marks = ["一","二","三","四"];
  const box = $("choices");
  box.innerHTML = "";
  q.c.forEach((text,i)=>{
    const b = document.createElement("button");
    b.className = "btn choice";
    b.innerHTML = `<span class="mark">${marks[i]}</span><span>${text}</span>`;
    b.onclick = ()=>pick(i,b);
    box.appendChild(b);
  });

  $("explain").classList.remove("show");
  $("explain").innerHTML = "";
  $("nextWrap").classList.remove("show");
  $("stamp").classList.remove("show");
}

function pick(i, btn){
  if(locked) return;
  locked = true;
  const q = ROUND[idx];
  const buttons = [...$("choices").children];
  buttons.forEach(b=>b.disabled = true);

  const correct = (i === q.a);
  if(correct) score++;

  buttons.forEach((b,bi)=>{
    if(bi === q.a) b.classList.add("correct");
    else if(bi === i) b.classList.add("picked-wrong");
    else b.classList.add("wrong");
  });

  const stamp = $("stamp");
  stamp.textContent = correct ? "正" : "誤";
  stamp.style.color = correct ? "var(--seal)" : "var(--gray)";
  stamp.style.borderColor = correct ? "var(--seal)" : "var(--gray)";
  void stamp.offsetWidth; // 애니메이션 재시작
  stamp.classList.add("show");

  const ex = $("explain");
  ex.innerHTML = (correct ? "<b>정답!</b> " : "<b>아쉽네요.</b> ") + q.e;
  ex.classList.add("show");

  $("nextBtn").textContent = (idx === ROUND.length - 1) ? "결과 보기" : "다음";
  $("nextWrap").classList.add("show");
}

function nextQuestion(){
  if(idx === ROUND.length - 1){
    finish();
    return;
  }
  idx++;
  renderQuestion();
}

function finish(){
  $("progBar").style.width = "100%";
  const t = TITLES.find(t=>score >= t.min);
  lastTitle = t.title;
  lastScore = score;
  $("medalChar").textContent = t.char;
  $("earnedTitle").textContent = t.title;
  $("scoreText").innerHTML = `${ROUND.length}문제 중 <b>${score}문제</b> 정답<br>${t.msg}`;
  show("scr-result");
}

function restart(){
  show("scr-cover");
}

// ===== 결과 공유 =====
let lastTitle = "", lastScore = 0;

function buildShareText(){
  return `[결단 뚝심 신의 — 경북 상식 대결]\n`
       + `내 낙관: ${lastTitle} (12문제 중 ${lastScore}문제 정답)\n`
       + `당신의 경북 내공은 몇 점? 도전해보세요!`;
}

async function shareResult(){
  const text = buildShareText();
  const url = location.href.split("#")[0];

  // 모바일: 시스템 공유 시트 (카톡·Threads·문자 등)
  if(navigator.share){
    try{
      await navigator.share({ title:"결단 뚝심 신의 — 경북 상식 대결", text, url });
      return;
    }catch(err){
      if(err && err.name === "AbortError") return; // 사용자가 닫음
    }
  }

  // PC 등 폴백: 문구+링크 클립보드 복사
  const full = text + "\n" + url;
  try{
    await navigator.clipboard.writeText(full);
    showToast("공유 문구가 복사됐습니다. 붙여넣기 하세요!");
  }catch(e){
    // 클립보드 API 불가 환경 최후 폴백
    const ta = document.createElement("textarea");
    ta.value = full;
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand("copy"); showToast("공유 문구가 복사됐습니다. 붙여넣기 하세요!"); }
    catch(_){ showToast("복사에 실패했습니다. 주소창의 링크를 직접 공유해주세요."); }
    document.body.removeChild(ta);
  }
}

let toastTimer = null;
function showToast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2600);
}
</script>
